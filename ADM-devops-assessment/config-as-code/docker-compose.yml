# Default: `docker compose up` starts only the app.
# Full observability stack: `docker compose --profile monitoring up`
#   App      -> http://localhost:8000
#   Prometheus -> http://localhost:9090
#   Grafana    -> http://localhost:3000  (admin / admin)
#   Loki       -> http://localhost:3100

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops-demo:local
    container_name: devops-demo
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Compose honours the Dockerfile HEALTHCHECK; this makes it explicit.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      logging: "promtail"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    profiles: ["monitoring"]
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    profiles: ["monitoring"]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      - loki
