global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

# In a real cluster you would point this at Alertmanager.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: devops-demo
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: devops-demo
