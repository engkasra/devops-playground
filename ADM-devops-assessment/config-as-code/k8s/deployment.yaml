apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo
  namespace: devops-demo
  labels:
    app: devops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-demo
  template:
    metadata:
      labels:
        app: devops-demo
      annotations:
        # Lets an annotation-based Prometheus scrape this pod directly.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          # For local kind: build as devops-demo:local and `kind load docker-image`.
          # In CI this is replaced with $CI_REGISTRY_IMAGE:<tag>.
          image: devops-demo:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          # Inject config + secret as environment variables.
          envFrom:
            - configMapRef:
                name: devops-demo-config
            - secretRef:
                name: devops-demo-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
