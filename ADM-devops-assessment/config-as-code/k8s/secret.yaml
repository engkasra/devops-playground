# Sensitive values. stringData lets you write plaintext; Kubernetes base64-encodes it.
# NOTE: never commit real secrets. In production use Sealed Secrets, SOPS, or Vault.
apiVersion: v1
kind: Secret
metadata:
  name: devops-demo-secret
  namespace: devops-demo
type: Opaque
stringData:
  API_TOKEN: "change-me-please"
